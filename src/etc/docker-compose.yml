services:

   openldap:
     image: osixia/openldap:latest
     environment:
       LDAP_DOMAIN: "example.org"
     command: --copy-service
     ports:
       - "3980:389"
     volumes:
      - ./docker/ldap-config:/container/service/slapd/assets/config/bootstrap/ldif/custom

   cas:
     build:
        context: .
        dockerfile_inline: |
          FROM ghcr.io/esupportail/apereo-cas-ldap-mfa:8.0.0-RC3
          RUN apt-get update && apt-get -y install curl
     volumes:
       - ./docker/cas-config:/etc/cas
       - ./docker/cas-config/tmp-cas:/tmp/cas
       - esup-otp-cas-build-directory:/esup-otp-cas
     healthcheck:
       test: [ "CMD-SHELL", "test -f /tmp/cas.healthcheck-passed || (curl -fs http://localhost:8080/cas/login | grep -q username && touch /tmp/cas.healthcheck-passed)" ]
       interval: 5s
       timeout: 10s
       retries: 20
     entrypoint: bash -c "
        ls -l /esup-otp-cas/build/libs/ &&
        cp /esup-otp-cas/build/libs/*x-SNAPSHOT.jar /cas-overlay/cas/lib/esup-otp-cas.jar &&
        java -server -noverify -Xmx2048M
             -XX:SharedArchiveFile=cas/cas.jsa
             -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005 \       
             -cp 'cas/cas.war:/cas-overlay/cas/lib/esup-otp-cas.jar'
       org.apereo.cas.web.CasWebApplication"
     network_mode: host   # partage le réseau de l'hôte - nécessaire pour accéder à l'API esup-otp-api en localhost:3000
     depends_on:
       openldap:
         condition: service_started
       esup-otp-cas-build:
         condition: service_completed_successfully

   mongodb:
     image: mongo:latest
     ports:
       - "27017:27017"

   esup-otp-api:
     build:
         context: .
         dockerfile: ./docker/esup-otp-api/Dockerfile
         args:
           - VERSION=v2.2.3
     volumes:
         - ./docker/esup-otp-api/properties:/properties
     entrypoint: bash -c "
         cp /properties/esup.json /app/properties/esup.json &&
         node run"
     ports:
       - "3000:3000"
     depends_on:
       - mongodb

   esup-otp-manager:
        build:
            context: .
            dockerfile: ./docker/esup-otp-manager/Dockerfile
            args:
              - VERSION=v2.0.1
        volumes:
          - ./docker/esup-otp-manager/properties:/properties
        entrypoint: bash -c "
          cp /properties/esup.json /app/properties/esup.json &&
          node run"
        network_mode: host   # partage le réseau de l'hôte - nécessaire pour accéder au CAS en localhost:8080
        depends_on:
          - mongodb

   esup-otp-cas-build:
        image: openjdk:25-ea-slim
        working_dir: /src
        environment:
          GRADLE_USER_HOME: /src/.gradle
          GRADLE_OPTS: -Dorg.gradle.project.buildDir=/esup-otp-cas/build
        command: bash -lc "chmod +x gradlew && ./gradlew clean build"
        volumes:
            - ../..:/src
            - esup-otp-cas-build-directory:/esup-otp-cas/

   playwright:
        build:
            context: ./docker/playwright
        profiles:
          - playwright
        command: ["sh", "-lc", "xvfb-run -a npx playwright test --headed esup-otp-cas.spec.js"]
        network_mode: host
        shm_size: 1gb
        volumes:
          - ./docker/playwright/playwright-report:/work/playwright-report
        depends_on:
          cas:
            condition: service_healthy
          esup-otp-api:
            condition: service_started
          esup-otp-manager:
            condition: service_started

volumes:
  esup-otp-cas-build-directory: